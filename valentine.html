<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For My Favorite Person</title>
    <style>
      /* --- IMAGE LINKS SECTION (Replace these URLs with yours) --- */
      :root {
        --bg-image: url("https://i.postimg.cc/v1RRpVLz/Whitney-5.jpg"); /* Background */
        --img1: url("https://i.postimg.cc/B8WWdKc7/Whitney-6.jpg"); /* Floating Photo 1 */
        --img2: url("https://i.postimg.cc/WDMRj15R/Whitney-7.jpg"); /* Floating Photo 2 */
        --img3: url("https://i.postimg.cc/B8WWdKc7/Whitney-6.jpg"); /* Floating Photo 3 */
        --img4: url("https://i.postimg.cc/WDMRj15R/Whitney-7.jpg"); /* Floating Photo 4 */
        --jump-img: url("https://i.postimg.cc/6p2P5BLd/Whitney-4.jpg"); /* Jumping GIF */
      }

      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
          var(--bg-image);
        background-size: cover;
        background-position: center;
        font-family: "Arial", sans-serif;
        overflow: hidden;
      }

      .corner-flower {
        position: absolute;
        font-size: 50px;
        z-index: 5;
      }
      .top-left {
        top: 10px;
        left: 10px;
      }
      .top-right {
        top: 10px;
        right: 10px;
      }
      .bottom-left {
        bottom: 10px;
        left: 10px;
      }
      .bottom-right {
        bottom: 10px;
        right: 10px;
      }

      .floating-img {
        position: absolute;
        width: 120px;
        height: 120px;
        border-radius: 15px;
        background-size: cover;
        background-position: center;
        border: 4px solid white;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        z-index: 2;
      }

      @keyframes moveV {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(80px);
        }
      }
      @keyframes moveH {
        0%,
        100% {
          transform: translateX(0);
        }
        50% {
          transform: translateX(80px);
        }
      }

      .i1 {
        top: 15%;
        left: 8%;
        animation: moveV 4s infinite ease-in-out;
        background-image: var(--img1);
      }
      .i2 {
        top: 55%;
        right: 10%;
        animation: moveV 5s infinite ease-in-out reverse;
        background-image: var(--img2);
      }
      .i3 {
        bottom: 15%;
        left: 15%;
        animation: moveH 6s infinite ease-in-out;
        background-image: var(--img3);
      }
      .i4 {
        top: 10%;
        right: 20%;
        animation: moveH 4.5s infinite ease-in-out reverse;
        background-image: var(--img4);
      }

      .container {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(8px);
        padding: 2.5rem;
        border-radius: 30px;
        text-align: center;
        z-index: 20;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        border: 2px solid #ff4d6d;
      }

      h1 {
        color: #ff4d6d;
        margin-bottom: 20px;
      }
      .btn-container {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 20px;
      }
      button {
        padding: 15px 30px;
        font-size: 1.2rem;
        border-radius: 50px;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }
      #yesBtn {
        background: #ff4d6d;
        color: white;
        transition: 0.3s;
      }
      #noBtn {
        background: #dee2e6;
        color: #495057;
      }

      #jumpingImg {
        display: none;
        width: 180px;
        height: 180px;
        margin: 20px auto;
        background-image: var(--jump-img);
        background-size: cover;
        border-radius: 20px;
        animation: jump 0.6s infinite alternate;
      }
      @keyframes jump {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-40px);
        }
      }

      .particle {
        position: absolute;
        animation: fall linear forwards;
        pointer-events: none;
      }
      @keyframes fall {
        to {
          transform: translateY(110vh) rotate(720deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="corner-flower top-left">🌸🌷</div>
    <div class="corner-flower top-right">🌹🌻</div>
    <div class="corner-flower bottom-left">🌼🌺</div>
    <div class="corner-flower bottom-right">💐✨</div>

    <div class="floating-img i1"></div>
    <div class="floating-img i2"></div>
    <div class="floating-img i3"></div>
    <div class="floating-img i4"></div>

    <div class="container">
      <h1 id="question">
        Will you be my Valentine?My Beautiful Whitney Veronica 🌹
      </h1>
      <div id="jumpingImg"></div>
      <div class="btn-container">
        <button id="yesBtn">Yes! ❤️</button>
        <button id="noBtn">No</button>
      </div>
    </div>

    <iframe
      id="music"
      width="0"
      height="0"
      src="https://www.youtube.com/embed/JErVP6xWKf4?enablejsapi=1"
      frameborder="0"
    ></iframe>

    <script>
      const noBtn = document.getElementById("noBtn");
      const yesBtn = document.getElementById("yesBtn");
      const jumpingImg = document.getElementById("jumpingImg");

      noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);
        noBtn.style.position = "absolute";
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
      });

      yesBtn.addEventListener("click", () => {
        document.getElementById("question").innerHTML = "I KNEW IT! ❤️";
        document.querySelector(".btn-container").style.display = "none";
        jumpingImg.style.display = "block";
        document.getElementById("music").src += "&autoplay=1";
        for (let i = 0; i < 60; i++) {
          setTimeout(createParticle, i * 50);
        }
      });

      function createParticle() {
        const p = document.createElement("div");
        const items = ["🌸", "🌹", "🌻", "🌼", "🌷", "❤️", "✨"];
        p.classList.add("particle");
        p.innerHTML = items[Math.floor(Math.random() * items.length)];
        p.style.left = Math.random() * 100 + "vw";
        p.style.top = "-10vh";
        p.style.fontSize = Math.random() * 20 + 20 + "px";
        p.style.animationDuration = Math.random() * 3 + 2 + "s";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 5000);
      }
    </script>
  </body>
</html>
